{% extends "base.html" %}

{% block title %}{{ post.title }} | Nhật ký hành trình{% endblock %}

{% block content %}
<section class="post-detail-card">
    <div class="detail-meta">
        <a class="back-link" href="{{ url_for('main.home') }}">← Quay lại trang chủ</a>
        <div class="post-date">{{ post.created_at.strftime("%d/%m/%Y %H:%M") }}</div>
    </div>

    {% if post.cover_image_url %}
    <img src="{{ post.cover_image_url }}" alt="Ảnh bìa của {{ post.title }}" class="detail-cover-image">
    {% endif %}

    <h2 class="detail-title">{{ post.title }}</h2>

    <article class="post-detail-body">
        {{ post.content }}
    </article>
</section>
{% endblock %}
