{% extends "base.html" %}

{% block title %}{{ post.title }} | Nhật ký hành trình{% endblock %}

{% block content %}
<article class="detail-page">
    <div class="detail-header">
        <a class="back-link" href="{{ url_for('main.home') }}">← Quay lại trang chủ</a>
        <span class="meta-pill">{{ post.created_at.strftime("%d/%m/%Y %H:%M") }}</span>
    </div>

    {% if post.cover_image_url %}
    <div class="detail-cover-wrap">
        <img src="{{ post.cover_image_url }}" alt="Ảnh bìa của {{ post.title }}" class="detail-cover-image">
    </div>
    {% endif %}

    <div class="detail-content">
        <h1>{{ post.title }}</h1>

        <div class="post-detail-body">
            {{ post.content }}
        </div>
    </div>
</article>
{% endblock %}
