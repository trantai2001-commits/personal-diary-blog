<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nhật ký hành trình{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <!-- Use Inter for body, Lora for headings -> perfect for blogs -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <div class="brand">
                <a href="{{ url_for('main.home') }}" class="brand-link">
                    Nhật ký hành trình
                </a>
            </div>

            <nav class="main-nav">
                <a href="{{ url_for('main.home') }}">Trang chủ</a>
                <a href="{{ url_for('auth.dashboard') }}">Admin</a>
            </nav>
        </div>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; {{ range(2023, 2027) | random }} Nhật ký hành trình. Xây dựng bằng Flask & CSS thuần.</p>
        </div>
    </footer>
</body>

</html>
