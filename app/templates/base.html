<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nhật ký hành trình{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Prevent flash of wrong theme: apply saved theme immediately -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme');
                if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            } catch (e) {}
        })();
    </script>
</head>

<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <div class="brand">
                <a href="{{ url_for('main.home') }}" class="brand-link">
                    Nhật ký hành trình
                </a>
            </div>

            <nav class="main-nav">
                <a href="{{ url_for('main.home') }}">Trang chủ</a>
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('auth.dashboard') }}">Dashboard</a>
                <a href="{{ url_for('auth.todos') }}">Todo</a>
                {% else %}
                <a href="{{ url_for('auth.dashboard') }}">Admin</a>
                {% endif %}

                <!-- Dark / Light mode toggle -->
                <button id="theme-toggle" class="theme-toggle" aria-label="Chuyển đổi giao diện tối/sáng" title="Chuyển giao diện">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                </button>
            </nav>
        </div>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2025 Nhật ký hành trình. Xây dựng bằng Flask &amp; CSS thuần.</p>
        </div>
    </footer>

    <script>
        // Theme toggle logic
        const toggle = document.getElementById('theme-toggle');
        const html   = document.documentElement;

        function getTheme() {
            return localStorage.getItem('theme') ||
                   (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        }

        function applyTheme(theme) {
            html.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        // Set initial icon state
        applyTheme(getTheme());

        toggle.addEventListener('click', function () {
            applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
        });
    </script>
</body>

</html>
