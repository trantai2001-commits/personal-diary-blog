<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Nhật ký hành trình{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Lora:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <!-- Prevent flash of wrong theme -->
    <script>
        (function () {
            try {
                var t = localStorage.getItem('theme');
                if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                    document.documentElement.setAttribute('data-theme', 'dark');
                }
            } catch (e) {}
        })();
    </script>
</head>

<body>
    <header class="site-header">
        <div class="container nav-wrap">
            <div class="brand">
                <a href="{{ url_for('main.home') }}" class="brand-link">Nhật ký hành trình</a>
            </div>

            <!-- Search bar (desktop) -->
            <form action="{{ url_for('main.search') }}" method="GET" class="nav-search" role="search">
                <div class="nav-search-wrap">
                    <span class="nav-search-icon">🔍</span>
                    <input
                        type="text"
                        name="q"
                        placeholder="Tìm kiếm..."
                        autocomplete="off"
                        class="nav-search-input"
                        aria-label="Tìm kiếm bài viết"
                    >
                </div>
            </form>

            <nav class="main-nav">
                <a href="{{ url_for('main.home') }}">Trang chủ</a>
                {% if current_user.is_authenticated %}
                <a href="{{ url_for('auth.dashboard') }}">Dashboard</a>
                <a href="{{ url_for('auth.todos') }}">Todo</a>
                {% else %}
                <a href="{{ url_for('auth.dashboard') }}">Admin</a>
                {% endif %}

                <!-- Dark/Light toggle -->
                <button id="theme-toggle" class="theme-toggle" aria-label="Chuyển giao diện tối/sáng">
                    <span class="icon-sun">☀️</span>
                    <span class="icon-moon">🌙</span>
                </button>
            </nav>
        </div>

        <!-- Mobile search -->
        <div class="container">
            <form action="{{ url_for('main.search') }}" method="GET" class="mobile-search" role="search">
                <div class="nav-search-wrap">
                    <span class="nav-search-icon">🔍</span>
                    <input type="text" name="q" placeholder="Tìm kiếm bài viết..." autocomplete="off" class="nav-search-input" aria-label="Tìm kiếm">
                </div>
            </form>
        </div>
    </header>

    <main class="page-shell">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2025 Nhật ký hành trình. Xây dựng bằng Flask &amp; CSS thuần.</p>
        </div>
    </footer>

    <script>
        const toggle = document.getElementById('theme-toggle');
        const html   = document.documentElement;

        function getTheme() {
            return localStorage.getItem('theme') ||
                   (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        }
        function applyTheme(theme) {
            html.setAttribute('data-theme', theme);
            localStorage.setItem('theme', theme);
        }

        applyTheme(getTheme());
        toggle.addEventListener('click', function () {
            applyTheme(getTheme() === 'dark' ? 'light' : 'dark');
        });
    </script>
</body>

</html>
