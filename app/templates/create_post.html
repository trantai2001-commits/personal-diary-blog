{% extends "base.html" %}

{% block title %}Tạo bài viết mới{% endblock %}

{% block content %}
<section class="editor-shell">
    <div class="editor-head">
        <div>
            <h1>Tạo bài viết mới</h1>
            <p>Viết lại một ngày đáng nhớ, một suy nghĩ, hoặc một cột mốc của đại ca.</p>
        </div>
        <a class="btn-soft" href="{{ url_for('auth.dashboard') }}">Quay lại Dashboard</a>
    </div>

    <form method="POST" enctype="multipart/form-data" class="editor-form">
        <div class="form-group">
            <label for="title">Tiêu đề</label>
            <input type="text" id="title" name="title" required>
        </div>

        <div class="form-group">
            <label for="cover_image">Ảnh bìa từ máy</label>
            <input type="file" id="cover_image" name="cover_image" accept="image/*">
        </div>

        <div class="form-group">
            <label for="content">Nội dung</label>
            <textarea id="content" name="content" rows="12" required></textarea>
        </div>

        <label class="checkbox-row">
            <input type="checkbox" name="is_published" checked>
            Đăng công khai ngay sau khi tạo
        </label>

        <div class="form-actions">
            <button type="submit" class="btn-primary">Lưu bài viết</button>
            <a class="btn-soft" href="{{ url_for('auth.dashboard') }}">Hủy</a>
        </div>
    </form>
</section>
{% endblock %}
