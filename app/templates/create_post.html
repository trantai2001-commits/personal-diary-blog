{% extends "base.html" %}

{% block title %}Tạo bài viết mới{% endblock %}

{% block content %}
<div class="container-narrow">
    <div class="admin-header">
        <h1>Viết bài mới</h1>
        <a class="btn-soft" href="{{ url_for('auth.dashboard') }}">Hủy</a>
    </div>

    <form method="POST" enctype="multipart/form-data" class="editor-form">
        <div class="form-group">
            <label for="title">Tiêu đề bài viết</label>
            <input type="text" id="title" name="title" placeholder="Hôm nay có gì vui..." required>
        </div>

        <div class="form-group">
            <label for="cover_image">Ảnh bìa (Cloudinary · tùy chọn)</label>
            <input type="file" id="cover_image" name="cover_image" accept="image/*" class="file-input">
        </div>

        <div class="form-group">
            <label for="inline_image">📷 Ảnh đính kèm (lưu local · tùy chọn)</label>
            <input type="file" id="inline_image" name="inline_image" accept="image/*" class="file-input">
            <small class="form-hint">Hiển thị cuối bài viết. Lưu trực tiếp trên server.</small>
        </div>

        <div class="form-group">
            <label for="content">Nội dung</label>
            <textarea id="content" name="content" placeholder="Kể lại một chút kỷ niệm..." required></textarea>
        </div>

        <div class="checkbox-group">
            <label class="checkbox-row">
                <input type="checkbox" name="is_published" checked>
                <span>Publish ngay lập tức (hiển thị công khai)</span>
            </label>
            <label class="checkbox-row">
                <input type="checkbox" name="is_featured">
                <span>📌 Ghim bài viết này lên đầu trang chủ</span>
            </label>
        </div>

        <button type="submit" class="btn-primary submit-full">Lưu &amp; Đăng bài</button>
    </form>
</div>
{% endblock %}
