{% extends "base.html" %}

{% block title %}Tạo bài viết mới{% endblock %}

{% block content %}
<div class="container-narrow">
    <div class="admin-header">
        <h1>Viết bài mới</h1>
        <a class="btn-soft" href="{{ url_for('auth.dashboard') }}">Hủy</a>
    </div>

    <form method="POST" enctype="multipart/form-data" class="editor-form">
        <div class="form-group">
            <label for="title">Tiêu đề bài viết</label>
            <input type="text" id="title" name="title" placeholder="Hôm nay có gì vui..." required>
        </div>

        <div class="form-group">
            <label for="cover_image">Ảnh phân cách (tùy chọn)</label>
            <input type="file" id="cover_image" name="cover_image" accept="image/*" style="border: none; padding: 0;">
        </div>

        <div class="form-group">
            <label for="content">Nội dung</label>
            <textarea id="content" name="content" placeholder="Kể lại một chút kỷ niệm..." required></textarea>
        </div>

        <label class="checkbox-row">
            <input type="checkbox" name="is_published" checked style="width: 18px; height: 18px; accent-color: var(--text-main);">
            <span>Publish ngay lập tức (hiển thị công khai)</span>
        </label>

        <button type="submit" class="btn-primary" style="width: 100%; padding: 14px;">Lưu & Đăng bài</button>
    </form>
</div>
{% endblock %}
