{% extends "base.html" %}

{% block title %}Sửa bài viết | Nhật ký hành trình{% endblock %}

{% block content %}
<div class="container-narrow">
    <div class="admin-header">
        <h1>Sửa bài viết</h1>
        <a class="btn-soft" href="{{ url_for('auth.dashboard') }}">Hủy</a>
    </div>

    <form method="POST" enctype="multipart/form-data" class="editor-form">
        <div class="form-group">
            <label for="title">Tiêu đề</label>
            <input type="text" id="title" name="title" value="{{ post.title }}" required>
        </div>

        {% if post.cover_image_url %}
        <div class="form-group">
            <label>Ảnh hiện tại</label>
            <img src="{{ post.cover_image_url }}" alt="Ảnh bìa hiện tại" style="max-height: 200px; border-radius: var(--radius-sm); margin-bottom: 12px; display: block; border: 1px solid var(--border);">
            <label class="checkbox-row" style="margin-bottom: 0;">
                <input type="checkbox" name="remove_cover_image" style="width: 18px; height: 18px; accent-color: var(--danger);">
                <span style="color: var(--danger); font-weight: 500;">Xóa ảnh này</span>
            </label>
        </div>
        {% endif %}

        <div class="form-group">
            <label for="cover_image">Tải ảnh bìa mới (sẽ đè ảnh cũ)</label>
            <input type="file" id="cover_image" name="cover_image" accept="image/*" style="border: none; padding: 0;">
        </div>

        <div class="form-group">
            <label for="content">Nội dung</label>
            <textarea id="content" name="content" required>{{ post.content }}</textarea>
        </div>

        <div style="display: flex; flex-direction: column; gap: 12px; margin-bottom: 30px;">
            <label class="checkbox-row" style="margin-bottom: 0;">
                <input type="checkbox" name="is_published" {% if post.is_published %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--text-main);">
                <span>Đăng công khai bài viết này</span>
            </label>
            <label class="checkbox-row" style="margin-bottom: 0;">
                <input type="checkbox" name="is_featured" {% if post.is_featured %}checked{% endif %} style="width: 18px; height: 18px; accent-color: var(--primary);">
                <span>📌 Ghim bài viết này lên đầu trang chủ</span>
            </label>
        </div>

        <button type="submit" class="btn-primary" style="width: 100%; padding: 14px;">Lưu thay đổi</button>
    </form>
</div>
{% endblock %}
