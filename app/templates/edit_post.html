{% extends "base.html" %}

{% block title %}Sửa bài viết | Nhật ký hành trình{% endblock %}

{% block content %}
<div class="container-narrow">
    <div class="admin-header">
        <h1>Sửa bài viết</h1>
        <a class="btn-soft" href="{{ url_for('auth.dashboard') }}">Hủy</a>
    </div>

    <form method="POST" enctype="multipart/form-data" class="editor-form">
        <div class="form-group">
            <label for="title">Tiêu đề</label>
            <input type="text" id="title" name="title" value="{{ post.title }}" required>
        </div>

        <!-- Cover image (Cloudinary) -->
        {% if post.cover_image_url %}
        <div class="form-group">
            <label>Ảnh bìa hiện tại</label>
            <img src="{{ post.cover_image_url }}" alt="Ảnh bìa hiện tại" class="preview-image">
            <label class="checkbox-row">
                <input type="checkbox" name="remove_cover_image">
                <span class="text-danger">Xóa ảnh bìa này</span>
            </label>
        </div>
        {% endif %}
        <div class="form-group">
            <label for="cover_image">Ảnh bìa mới (Cloudinary · sẽ đè ảnh cũ)</label>
            <input type="file" id="cover_image" name="cover_image" accept="image/*" class="file-input">
        </div>

        <!-- Inline image (local) -->
        {% if post.local_image_url %}
        <div class="form-group">
            <label>📷 Ảnh đính kèm hiện tại</label>
            <img src="{{ post.local_image_url }}" alt="Ảnh đính kèm hiện tại" class="preview-image">
            <label class="checkbox-row">
                <input type="checkbox" name="remove_inline_image">
                <span class="text-danger">Xóa ảnh đính kèm này</span>
            </label>
        </div>
        {% endif %}
        <div class="form-group">
            <label for="inline_image">📷 Ảnh đính kèm mới (lưu local · tùy chọn)</label>
            <input type="file" id="inline_image" name="inline_image" accept="image/*" class="file-input">
            <small class="form-hint">Hiển thị cuối bài viết. Lưu trực tiếp trên server.</small>
        </div>

        <div class="form-group">
            <label for="content">Nội dung</label>
            <textarea id="content" name="content" required>{{ post.content }}</textarea>
        </div>

        <div class="checkbox-group">
            <label class="checkbox-row">
                <input type="checkbox" name="is_published" {% if post.is_published %}checked{% endif %}>
                <span>Đăng công khai bài viết này</span>
            </label>
            <label class="checkbox-row">
                <input type="checkbox" name="is_featured" {% if post.is_featured %}checked{% endif %}>
                <span>📌 Ghim bài viết này lên đầu trang chủ</span>
            </label>
        </div>

        <button type="submit" class="btn-primary submit-full">Lưu thay đổi</button>
    </form>
</div>
{% endblock %}
